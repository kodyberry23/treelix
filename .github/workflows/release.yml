name: release

# Tag a release to build macOS binaries and publish them:
#   1. bump `version` in Cargo.toml (e.g. 0.2.0)
#   2. git commit -am "release: v0.2.0" && git tag v0.2.0
#   3. git push && git push --tags
# The tag must match the Cargo.toml version (enforced below).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Create the GitHub release exactly once, before the parallel build jobs run.
  # Previously each matrix job ran action-gh-release concurrently and, because a
  # freshly-created release isn't immediately discoverable by tag, both jobs
  # created their own release object for the same tag — leaving two releases
  # each holding only half the assets. Gating the build jobs on this one makes
  # the release already exist by the time they upload, so they attach to it
  # instead of creating duplicates.
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check tag matches Cargo.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ver="$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')"
          echo "tag=$tag cargo=$ver"
          if [ "$tag" != "$ver" ]; then
            echo "::error::tag v$tag does not match Cargo.toml version $ver"
            exit 1
          fi

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true

  build:
    needs: create-release
    # Both targets build on the Apple-Silicon runner: aarch64 natively and
    # x86_64 via cross-compilation. (GitHub removed the Intel macos-13 image;
    # current Intel labels are macos-15-intel/-large, but cross-compiling from
    # arm64 avoids needing a second runner entirely.)
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        run: |
          dist="treelix-${{ matrix.target }}"
          mkdir -p "$dist"
          cp "target/${{ matrix.target }}/release/treelix" "$dist/"
          cp README.md LICENSE "$dist/" 2>/dev/null || true
          tar -czf "$dist.tar.gz" "$dist"
          shasum -a 256 "$dist.tar.gz" > "$dist.tar.gz.sha256"

      - name: Upload assets to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            treelix-${{ matrix.target }}.tar.gz
            treelix-${{ matrix.target }}.tar.gz.sha256
          fail_on_unmatched_files: true
